# mypy.ini
[mypy]
python_version = 3.11
strict = True
ignore_missing_imports = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
warn_return_any = False
disallow_any_explicit = False

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True