name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (Ruff)
        run: ruff check .

      - name: Format Check (Ruff)
        run: ruff format --check .

      - name: Type Check (MyPy)
        run: mypy config/ test/

      - name: Test & Coverage (Pytest)
        run: pytest test/ --cov=config --cov-report=term-missing -v