# EN: CI/CD pipeline with Docker build validation / FR: Pipeline CI/CD avec validation de build Docker

name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- Existing Jobs ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run Ruff lint
        run: ruff check .
      - name: Run Ruff format check
        run: ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run MyPy
        run: mypy src/ test/

  test:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest test/ -v --cov=src --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  # --- NEW: Docker Build Job ---
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image (multi-stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          load: true
          tags: ai-data-analyst:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker image (basic CLI check)
        run: |
          docker run --rm ai-data-analyst:ci-test --help
          echo "✅ Docker image built and CLI works"
      
      - name: Scan for vulnerabilities (optional)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ai-data-analyst:ci-test
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'