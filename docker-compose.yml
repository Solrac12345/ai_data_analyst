# EN: Local development configuration with volume mounting / FR: Configuration de développement local avec montage de volumes

services:
  app:
    build:
      context: .
      target: runtime
    image: ai-data-analyst:latest
    container_name: ai-data-analyst
    volumes:
      - ./:/app:ro
      - ./output:/app/output
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    # EN: Use command instead of entrypoint for easier CLI override / FR: Utiliser command au lieu d'entrypoint pour un override plus facile
    entrypoint: []
    command: ["python", "-m", "src.cli.main", "--help"]
    user: appuser
    restart: unless-stopped

  test:
    build:
      context: .
      target: builder
    image: ai-data-analyst:latest
    container_name: ai-data-analyst-test
    volumes:
      - ./test:/app/test:ro
      - ./config:/app/config:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: []
    command: >
      sh -c "
        pip install --no-cache-dir '.[dev]' &&
        python -m pytest test/ -v --cov=src
      "
    user: root
    profiles:
      - testing