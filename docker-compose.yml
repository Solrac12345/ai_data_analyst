# EN: Local development & API configuration / FR: Configuration de développement local & API

services:
  app:
    build:
      context: .
      target: runtime
    image: ai-data-analyst:latest
    container_name: ai-data-analyst
    volumes:
      - ./:/app:ro
      - ./output:/app/output
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: []
    command: ["python", "-m", "src.cli.main", "--help"]
    user: appuser
    restart: unless-stopped

  api:
    build:
      context: .
      target: runtime
    image: ai-data-analyst:latest
    container_name: ai-data-analyst-api
    ports:
      - "8000:8000"  # EN: Expose Swagger UI & API / FR: Exposer Swagger UI & API
    volumes:
      - ./:/app:ro   # EN: Mount project root for data access / FR: Monter la racine du projet pour l'accès aux données
      - ./output:/app/output
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: []
    # EN: Run Uvicorn server / FR: Exécuter le serveur Uvicorn
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    user: appuser
    restart: unless-stopped

  test:
    build:
      context: .
      target: builder
    image: ai-data-analyst:latest
    container_name: ai-data-analyst-test
    volumes:
      - ./test:/app/test:ro
      - ./config:/app/config:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: []
    command: >
      sh -c "
        pip install --no-cache-dir '.[dev]' &&
        python -m pytest test/ -v --cov=src
      "
    user: root
    profiles:
      - testing