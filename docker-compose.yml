# EN: Local development configuration with volume mounting / FR: Configuration de développement local avec montage de volumes

version: '3.8'

services:
  app:
    build:
      context: .
      target: runtime
    image: ai-data-analyst:latest
    container_name: ai-data-analyst
    volumes:
      - .//app/ro
      - ./output:/app/output
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    command: --help
    user: appuser
    restart: unless-stopped

  test:
    build:
      context: .
      target: builder
    image: ai-data-analyst:latest
    container_name: ai-data-analyst-test
    volumes:
      # EN: Don't mount src/ - it's already in the image. Only mount tests & config.
      # FR: Ne pas monter src/ - il est déjà dans l'image. Monter uniquement les tests et la config.
      - ./test:/app/test:ro
      - ./config:/app/config:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: []
    command: >
      sh -c "
        pip install --no-cache-dir '.[dev]' &&
        python -m pytest test/ -v --cov=src
      "
    user: root
    profiles:
      - testing