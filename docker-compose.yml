# EN: Local development configuration with volume mounting / FR: Configuration de développement local avec montage de volumes

version: '3.8'

services:
  app:
    build:
      context: .
      target: runtime
    image: ai-data-analyst:latest
    container_name: ai-data-analyst
    volumes:
      - .//app/ro
      - ./output:/app/output
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    command: --help
    user: appuser
    restart: unless-stopped

  test:
    build:
      context: .
      target: builder
    image: ai-data-analyst:latest
    container_name: ai-data-analyst-test
    volumes:
      - ./src:/app/src:ro          # EN: Read-only mount prevents write conflicts / FR: Montage en lecture seule évite les conflits d'écriture
      - ./test:/app/test:ro
      - ./config:/app/config:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: []
    # EN: Use non-editable install to avoid permission issues with mounted volumes / FR: Utiliser une installation non-éditable pour éviter les problèmes de permissions
    command: >
      sh -c "
        pip install --no-cache-dir '.[dev]' &&
        python -m pytest test/ -v --cov=src
      "
    user: root
    profiles:
      - testing